<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Beauty Care</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/auth.css" />
  <link rel="stylesheet" href="../../components/breadcrumbs.css" />
  <link rel="stylesheet" href="contact.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="panner contact y-u-m-b-0">
      <h1 class="y-u-text-center">  تواصل معنا </h1>
      <div class="breadcrumbs container y-u-max-w-1200">
        <a href="../layout/index.html">الرئيسية</a>
        <p>تواصل معنا</p>
      </div>
    </section>

    <section class="auth-section">
      <div class="container right-left y-u-max-w-1200">
        <div class="right">
          <form action="" id="contact-form">
            <div class="form-group">
              <label for="name">الإسم بالكامل</label>
              <input type="text" id="name" name="name">
            </div>



            <div class="form-group">
              <label for="number"> رقم الهاتف</label>
              <input type="tel" id="number" name="number" dir="ltr" maxlength="10" minlength="10">
            </div>
            <div class="form-group">
              <label for="email">البريد الإلكتروني</label>
              <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
              <label for="message"> اكتب استفسارك من فضلك</label>
              <textarea name="message" id="message" cols="30" rows="4" style="resize: vertical;"></textarea>
            </div>
            <button type="submit"> ارسال</button>
          </form>

        </div>
        <div class="left">
          <img src="../../assets/way3.jpg" alt="">
        </div>
      </div>




    </section>
    <section class="contact-section">
      <div class="container y-u-max-w-1200">
        <h2>معلومات التواصل</h2>
        <div class="contact-grid">
          <div class="item">
            <img src="../../assets/phone.svg" alt="">
            <p>+966 12 345 6789</p>
          </div>
          <div class="item">
            <img src="../../assets/email.svg" alt="">
            <p>Beauty@gmail.com</p>
          </div>
          <div class="item">
            <img src="../../assets/map.svg" alt="">
            <p>الرياض , المملكة العربية السعودية</p>
          </div>
        </div>

      </div>
    </section>


  </main>



  <y-footer></y-footer>

  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/y-app-init.js"></script>
</body>

</html>
