<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-y='page-title'>تسجيل الدخول - الذبيحة</title>
    <link rel="Icon" type="image/png" href="../../assets/logo.png" data-y="favicon">

    <link rel="stylesheet" href="../../base/reset.css">
    <link rel="stylesheet" href="../../base/tokens.css">
    <link rel="stylesheet" href="../../base/typography.css">
    <link rel="stylesheet" href="../../base/utilities.css">

    <link rel="stylesheet" href="../../assets/fontawesome/css/all.min.css">

    <link rel="stylesheet" href="../../components/y-header.css">
    <link rel="stylesheet" href="../../components/y-footer.css">

    <link rel="stylesheet" href="../../components/y-forms.css">
    <link rel="stylesheet" href="../../components/y-buttons.css">

    <link rel="stylesheet" href="../../components/y-auth.css">

    <link rel="stylesheet" href="./y-login.css">
    <link rel="manifest" href="./manifest.json">
</head>

<body>
    <div id="header-placeholder" data-y="header-placeholder"></div>

    <main class="y-l-auth-page" data-y="login-page">
        <div class="y-c-auth-card" data-y="login-card">

            <h1 class="y-c-form-title" data-y="form-title">تسجيل دخول</h1>

            <form action="#" method="POST" data-y="login-form" id="login-form">

                <div class="y-c-form-group" data-y="form-group-email">
                    <label for="email" class="y-c-form-label">البريد الإلكتروني <span
                            class="y-c-required">*</span></label>
                    <input type="email" id="email" name="email" class="y-c-form-input" required data-y="email-input">
                </div>

                <div class="y-c-form-group y-l-password-wrapper" data-y="form-group-password">
                    <label for="password" class="y-c-form-label">كلمة المرور <span class="y-c-required">*</span></label>
                    <input type="password" id="password" name="password" class="y-c-form-input" required data-y="login-password-input">
                    <i class="fas fa-eye y-c-password-toggle" id="password-toggle" data-y="password-toggle-icon"></i>
                </div>

                <div class="y-l-forgot-password" data-y="forgot-password-link-container">
                    <a href="../pass-reset/layout.html" class="y-c-forgot-password-link"
                        data-y="forgot-password-link">هل نسيت كلمة المرور؟</a>
                </div>

                <div class="y-l-form-button" data-y="form-submit-button-container">
                    <button type="submit" class="y-c-outline-btn" data-y="form-submit-btn">تسجيل الدخول</button>
                </div>

                <div class="y-c-auth-switch" data-y="auth-switch-container">
                    <span>ليس لديك حساب؟</span>
                    <a href="../signup/layout.html" data-y="auth-switch-link">إنشاء حساب جديد</a>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder" data-y="footer-placeholder"></div>

    <script src="../../js/shared-components.js" data-y="shared-components-script"></script>
    <script src="../../js/global-validation.js"></script>
    <script src="../../js/auth-forms.js" data-y="auth-forms-script"></script>
</body>

</html>
