<!-- Usage: Copy this component and replace placeholders with backend data -->
<div class="account-form-card">
  <h2 class="section-title">المعلومات الشخصية</h2>
  <form class="account-form" action="">
    <div class="form-group">
      <div class="group">
        <label for="name">
          <i class="fas fa-user"></i>
          الاسم الاول
        </label>
        <input type="text" id="name" name="name" placeholder="أدخل الاسم الاول">
      </div>
      <div class="group">
        <label for="family-name">
          <i class="fas fa-user"></i>
          اسم العائلة
        </label>
        <input type="text" id="family-name" name="family-name" placeholder="أدخل اسم العائلة">
      </div>
    </div>
    <div class="form-group">
      <div class="group">
        <label for="date-of-birth">
          <i class="fas fa-calendar"></i>
          تاريخ الميلاد
        </label>
        <input type="date" id="date-of-birth" name="date-of-birth">
      </div>
      <div class="group">
        <label for="gender">
          <i class="fas fa-venus-mars"></i>
          النوع
        </label>
        <select id="gender" name="gender">
          <option value="">اختر النوع</option>
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="group">
        <label for="email">
          <i class="fas fa-envelope"></i>
          البريد الإلكتروني
        </label>
        <input type="email" id="email" name="email" placeholder="example@email.com">
      </div>
      <div class="group">
        <label for="phone">
          <i class="fas fa-phone"></i>
          رقم الهاتف
        </label>
        <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-save">
        <i class="fas fa-save"></i>
        حفظ التغييرات
      </button>
    </div>
  </form>
</div>
