<head>
  <meta charset="UTF-8" />

  <link rel="icon" href="../../assets/icon.png" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../base/utilities.css" />

  <link rel="stylesheet" href="../../components/layout/y-c-navbar.css" />
  <link rel="stylesheet" href="../../components/layout/y-c-footer.css" />
  <link rel="stylesheet" href="../../components/layout/y-c-breadcrumb.css" />

  <link rel="stylesheet" href="../../components/account/y-c-account-sidebar.css" />
  <link rel="stylesheet" href="../../components/account/y-c-orders.css" />
  <link rel="stylesheet" href="../../components/account/y-c-notifications.css" />
  <link rel="stylesheet" href="../../components/account/y-c-account-details.css" />
  <link rel="stylesheet" href="../../components/account/y-c-address.css" />

</head>

<body data-current-page="my-account">
  <div data-y="nav"></div>
  <header data-y="design-header"></header>
  <main data-y="main">
    <div class="main-container y-u-my-5">
      <div data-y="breadcrumb"></div>
      <div class="account-layout">
        <aside data-y="account-sidebar" class="account-sidebar-shell"></aside>
        <section id="account-content" class="account-content-shell y-u-justify-center"></section>
      </div>
    </div>
  </main>

  <div class="popup-overlay" id="deactivate-popup" style="display: none;">
    <div class="popup-content">
      <h3 class="popup-title">هل انت متأكد من تعطيل الحساب</h3>
      <p class="popup-description">
        هنالك العديد من الأنواع المتوفرة لنصوص لوريم إيبسوم، ولكن الغالبية تم تعديلها بشكل ما عبر إدخال بعض النوادر أو الكلمات العشوائية إلى النص.
      </p>
      <div class="popup-actions">
        <button class="popup-btn btn-no" id="btn-cancel-deactivate">لا</button>
        <button class="popup-btn btn-confirm" id="btn-confirm-deactivate">تعطيل</button>
      </div>
    </div>
  </div>

  <footer data-y="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../../js/header-toggle.js"></script>
  <script src="../../js/y-navbar.js"></script>
  <script src="../../js/y-footer.js"></script>
  <script src="../../js/y-design-header.js"></script>
  <script src="../../js/y-breadcrumb.js"></script>
  <script src="../../js/y-account-sidebar.js"></script>
  <script src="../../js/y-order-details.js"></script>
  <script src="../../js/y-my-account.js"></script>
</body>

</html>
