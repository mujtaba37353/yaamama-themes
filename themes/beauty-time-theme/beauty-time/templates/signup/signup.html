<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Time</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/auth.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="panner">
    </section>

    <section class="auth-section">
      <div class="container right-left y-u-max-w-1200">
        <div class="right">

          <form action="">
            <h2><img src="../../assets/profile-primary.svg" alt=""> إنشاء حساب جديد</h2>
            <div class="form-group">
              <label for="email">البريد الإلكتروني</label>
              <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <input type="password" id="password" name="password">
            </div>
            <div class="form-group">
              <label for="confirm-password">تأكيد كلمة المرور</label>
              <input type="password" id="confirm-password" name="confirm-password">
            </div>
            <div class="checkbox">
              <input type="checkbox" id="checkbox" name="checkbox">
              <label for="checkbox"> تذكرني </label>
            </div>
            <button type="submit">إنشاء حساب</button>
            <div class="signup-login-link">
              <span>لدي حساب بالفعل ؟</span>
              <a href="../login/login.html"> تسجيل دخول</a>
            </div>
          </form>

        </div>
      </div>




    </section>


  </main>


  <y-footer></y-footer>

  <script src="../../js/y-app-init.js"></script>
</body>

</html>
