<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stationary</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/auth.css" />
  <link rel="stylesheet" href="../../components/breadcrumbs.css" />
  <link rel="stylesheet" href="contact.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="panner panner-image  y-u-m-b-0 container y-u-max-w-1200">
      <h1 class="y-u-text-center">تواصل معنا </h1>
    </section>
    <section class="breadcrumbs container y-u-max-w-1200 y-u-m-b-0 ">
      <a href="../layout/index.html">الرئيسية</a>
      <p>تواصل معنا</p>
    </section>
    
    
    

    <section class="auth-section">
      <div class="container y-u-max-w-1200">
        <div class="right">
          <form action="">
            <div class="form-group">
              <label for="name">الاسم</label>
              <input type="text" id="name" name="name">
            </div>
            <div class="form-group">
              <label for="number"> الهاتف</label>
              <input type="number" id="number" name="number">
            </div>
            <div class="form-group">
              <label for="email">البريد الإلكتروني</label>
              <input type="email" id="email" name="email">
            </div>


            <div class="form-group">
              <label for="message"> الرسالة</label>
              <textarea type="text" id="message" name="message"></textarea>
            </div>
            <button type="submit">إرسال</button>
          </form>

        </div>
        <div class="left">
          <img src="../../assets/contact-us.png" alt="صورة توضيحية للتواصل معنا">
        </div>


      </div>




    </section>


  </main>



  <y-footer></y-footer>

  <script src="../../js/y-app-init.js"></script>
</body>

</html>
