<!DOCTYPE html>

            <h3 class="y-c-header-title" data-y="account-header-title">حسابي</h3>

        <a href="#" id="mobile-account-details-link" data-title="تفاصيل الحساب" data-y="mobile-account-details-link"

        </a>
        <a href="#" id="mobile-orders-link" data-title="الطلبات" data-y="mobile-orders-link"

            <i class="fas fa-map-marker-alt"></i>
            <span>العنوان</span>
        </a>
        <a href="../login/layout.html" class="y-c-mobile-nav-item" data-y="mobile-logout-link">
            <i class="fas fa-sign-out-alt" data-y="mobile-logout-icon"></i>
