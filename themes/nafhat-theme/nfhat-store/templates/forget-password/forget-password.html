<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nafhat - متجر العطور</title>
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="manifest" href="../manifest.json" />

  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />

  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/forms.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="container y-u-w-full y-u-flex y-u-justify-center">
      <div class="y-u-max-w-600 y-u-w-full">
        <div class="y-u-surface y-u-rounded-12 y-u-p-24 y-u-shadow-sm">
          <h1 class="y-u-text-3xl y-u-text-bold y-u-color-muted y-u-m-b-16 y-u-text-center">استعادة كلمة المرور</h1>
          <p class="y-u-text-center y-u-text-muted y-u-m-b-16">أدخل بريدك الإلكتروني وسنرسل لك رابطًا لإعادة تعيين كلمة
            المرور.</p>
          <form class="y-u-flex y-u-flex-col y-u-gap-16">
            <div class="y-c-field">
              <label class="y-c-label" for="email">البريد الإلكتروني</label>
              <input id="email" type="email" class="y-c-input" placeholder="example@mail.com" required />
            </div>
            <button type="submit" class="y-c-btn y-c-btn--primary">إرسال الرابط</button>
            <a href="../login/login.html" class="y-c-btn y-c-btn--ghost y-u-text-center">العودة لتسجيل الدخول</a>
          </form>
        </div>
      </div>
    </section>
  </main>



  <y-footer></y-footer>


  <script src="../../js/y-app-init.js"></script>
</body>

</html>
