<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-y='page-title'>حساب جديد - الذبيحة</title>
    <link rel="Icon" type="image/png" href="../../assets/logo.png" data-y="favicon">

    <link rel="stylesheet" href="../../base/reset.css">
    <link rel="stylesheet" href="../../base/tokens.css">
    <link rel="stylesheet" href="../../base/typography.css">
    <link rel="stylesheet" href="../../base/utilities.css">

    <link rel="stylesheet" href="../../assets/fontawesome/css/all.min.css">

    <link rel="stylesheet" href="../../components/y-header.css">
    <link rel="stylesheet" href="../../components/y-footer.css">

    <link rel="stylesheet" href="../../components/y-forms.css">
    <link rel="stylesheet" href="../../components/y-buttons.css">

    <link rel="stylesheet" href="../../components/y-auth.css">

    <link rel="stylesheet" href="./y-signup.css">
    <link rel="manifest" href="./manifest.json">
</head>

<body>
    <div id="header-placeholder" data-y="header-placeholder"></div>

    <main class="y-l-auth-page" data-y="signup-page">
        <div class="y-c-auth-card" data-y="signup-card">

            <h1 class="y-c-form-title" data-y="form-title">حساب جديد</h1>

            <form action="#" method="POST" data-y="signup-form" id="signup-form">

                <div class="y-c-form-group" data-y="form-group-email">
                    <label for="email" class="y-c-form-label">البريد الإلكتروني <span
                            class="y-c-required">*</span></label>
                    <input type="email" id="email" name="email" class="y-c-form-input" required data-y="email-input">
                </div>

                <div class="y-c-form-group" data-y="form-group-phone">
                    <label for="phone" class="y-c-form-label">رقم الجوال <span class="y-c-required">*</span></label>
                    <input type="tel" id="phone" name="phone" class="y-c-form-input" placeholder="05 xxxx xxxx" required data-y="phone-input">
                </div>

                <div class="y-c-form-group" data-y="form-group-password">
                    <label for="password" class="y-c-form-label">كلمة المرور <span class="y-c-required">*</span></label>
                    <input type="password" id="password" name="password" class="y-c-form-input" required data-y="password-input">
                </div>

                <div class="y-c-form-group" data-y="form-group-confirm-password">
                    <label for="confirm-password" class="y-c-form-label">إعادة كلمة المرور <span class="y-c-required">*</span></label>
                    <input type="password" id="confirm-password" name="confirmPassword" class="y-c-form-input" required data-y="confirm-password-input">
                </div>

                <div class="y-l-form-button" data-y="form-submit-button-container">
                    <button type="submit" class="y-c-outline-btn" data-y="form-submit-btn">إنشاء حساب جديد</button>
                </div>

                <div class="y-c-auth-switch" data-y="auth-switch-container">
                    <span>لديك حساب بالفعل؟</span>
                    <a href="../login/layout.html" data-y="auth-switch-link">تسجيل دخول</a>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder" data-y="footer-placeholder"></div>

    <script src="../../js/shared-components.js" data-y="shared-components-script"></script>
    <script src="../../js/global-validation.js"></script>
    <script src="../../js/products.js"></script>
    <script src="../../js/auth-forms.js"></script>
</body>

</html>
