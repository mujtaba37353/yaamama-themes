<div class="address-form">
  <div class="section">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">الاسم الأول *</label>
        <input type="text" id="firstName" required />
      </div>
      <div class="form-group">
        <label for="lastName">اسم العائلة *</label>
        <input type="text" id="lastName" required />
      </div>
    </div>

    <div class="form-group">
      <label>الدولة / المنطقة</label>
      <p class="fw-semibold fs-5">المملكة العربية السعودية</p>
    </div>

    <div class="form-group">
      <label for="address">العنوان *</label>
      <input type="text" id="address" placeholder="العنوان" required />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="city">المدينة *</label>
        <input type="text" id="city" required />
      </div>
      <div class="form-group">
        <label for="province">المحافظة *</label>
        <input type="text" id="province" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="postalCode">الرمز البريدي *</label>
        <input type="text" id="postalCode" required />
      </div>
      <div class="form-group">
        <label for="phone">رقم الهاتف *</label>
        <input type="tel" id="phone" required />
      </div>
    </div>

    <div class="form-group">
      <label for="email">البريد الإلكتروني *</label>
      <input type="email" id="email" required />
    </div>
  </div>
</div>
