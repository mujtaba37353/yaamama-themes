<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elegance</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/auth.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

  <y-navbar></y-navbar>

  <main>
    <section class="panner  y-u-m-b-0">
      <h1 class="y-u-text-center">اعادة تعيين كلمة المرور </h1>
    </section>

    <section class="auth-section">
      <div class="container y-u-max-w-1200">

        <div class="right">
          <form class="forget-password-form" id="forget-password-form" action="">
            <div class="form-group">
              <label for="email">
                البريد الإلكتروني
                <span class="required">*</span>
              </label>
              <input type="email" id="email" name="email" placeholder="">
            </div>

            <span class="description">
              أدخل بريدك الإلكتروني لإرسال رابط إعادة تعيين كلمة المرور. تأكد من إدخال البريد المسجل لدينا لاستعادة
              الوصول إلى حسابك بسهولة
            </span>

            <button type="submit" class="reset-button">إعادة تعيين كلمة المرور</button>
          </form>
        </div>
        <div class="left">
          <img src="../../assets/login.png" alt="">
        </div>
      </div>
    </section>
  </main>


  <y-footer></y-footer>
  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/components-loader.js"></script>

  <script src="../../js/y-app-init.js"></script>

</body>

</html>
