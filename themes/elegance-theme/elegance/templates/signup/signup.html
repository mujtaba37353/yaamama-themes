<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elegance</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/panner.css" />
  <link rel="stylesheet" href="../../components/auth.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

    <y-navbar></y-navbar>

  <main>
    <section class="panner  y-u-m-b-0">
      <h1 class="y-u-text-center">إنشاء حساب جديد </h1>
    </section>

    <section class="auth-section">
      <div class="container y-u-max-w-1200">
       
        <div class="right">
          <form class="signup-form" id="signup-form" action="">
            <div class="form-group">
              <label for="email">
                البريد الإلكتروني
                <span class="required">*</span>
              </label>
              <input type="email" id="email" name="email" placeholder="">
            </div>
            
            <div class="form-group">
              <label for="phone">
                رقم الجوال
                <span class="required">*</span>
              </label>
              <input type="tel" id="phone" name="phone" placeholder="05 xxxx xxxx" dir="ltr">
            </div>

            <div class="form-group">
              <label for="password">
                كلمة المرور
                <span class="required">*</span>
              </label>
              <div class="password-input-wrapper">
                <input type="password" id="password" name="password" placeholder="">
                <button type="button" class="password-toggle" aria-label="إظهار/إخفاء كلمة المرور">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirm-password">
                إعادة كلمة المرور
                <span class="required">*</span>
              </label>
              <div class="password-input-wrapper">
                <input type="password" id="confirm-password" name="confirm-password" placeholder="">
                <button type="button" class="password-toggle" aria-label="إظهار/إخفاء كلمة المرور">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="signup-button">إنشاء حساب جديد</button>
            <div class="login-link">
              <span>لديك حساب بالفعل؟</span>
              <a href="../login/login.html">تسجيل دخول</a>
            </div>
          </form>
        </div> <div class="left">
          <img src="../../assets/signup.png" alt="">
        </div>
      </div>
    </section>
  </main>



    <y-footer></y-footer>

  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/components-loader.js"></script>
  <script src="../../js/y-app-init.js"></script>
</body>

</html>
