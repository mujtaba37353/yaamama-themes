<div class="auth-container">
  <img src="../../assets/password.png" alt="" />
  <div class="form">
    <form action="POST">
      <h1>
        <span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather user"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg> </span
        >استعادة كلمة المرور
      </h1>
      <p>برجاء تسجيل رقم الهاتف المسجل به الحساب وسيصلك كود مكون من 4 أرقام</p>
      <label for="phone">ادخل رقم الهاتف </label>
      <input type="phone" required />

      <a href="#products" class="btn-auth" id="reset-password-btn">التالي </a>
    </form>
  </div>
</div>

<div id="reset-success-modal" class="modal-overlay" style="display: none">
  <div class="modal-content">
    <div class="modal-icon">
      <i class="fa fa-check-circle"></i>
    </div>
    <h2>تم إرسال كود التحقق بنجاح</h2>
    <p>تم إرسال كود مكون من 4 أرقام إلى رقم هاتفك. برجاء التحقق من الرسائل.</p>
    <button class="btn-primary" id="return-home-btn-reset">
      العودة للرئيسية
    </button>
  </div>
</div>
