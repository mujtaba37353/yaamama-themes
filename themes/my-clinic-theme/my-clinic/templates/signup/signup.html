<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Clinic</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/auth.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="auth-section">
      <div class="container y-u-max-w-1200">
        <div class="right">
          <form action="">
            <h2> حساب جديد</h2>

            <div class="form-group">
              <label for="name">الاسم</label>
              <input type="text" id="name" name="name">
            </div>
            <div class="form-group">
              <label for="phone">رقم الهاتف</label>
              <input type="number" id="phone" name="phone">
            </div>
            <div class="form-group">
              <label for="email">البريد الإلكتروني</label>
              <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
              <label for="birthdate"> تاريخ الميلاد</label>
              <input type="date" id="birthdate" name="birthdate">
            </div>
            <div class="form-group">
              <label for="birthdate"> الجنس</label>
              <div class="left">
                <input type="radio" id="gender" name="gender">
                <label for="gender">ذكر</label>
                <input type="radio" id="gender" name="gender">
                <label for="gender">أنثى</label>
              </div>

            </div>
            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <input type="password" id="password" name="password">
            </div>
            <button type="submit" class="btn main-button fw">إنشاء حساب</button>
            <p class="new-account">لديك حساب؟ <a href="../login/login.html">تسجيل الدخول</a></p>
          </form>

        </div>
      </div>




    </section>


  </main>


  <y-footer></y-footer>

  <script src="../../js/y-app-init.js"></script>
</body>

</html>
