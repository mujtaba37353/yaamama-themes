<form class="y-c-profile-form" data-y="profile-form">

    <div class="y-c-form-section" data-y="login-info-section">
        <h3 class="y-c-form-section-title" data-y="login-info-title">معلومات الدخول</h3>
        <div class="y-c-form-row" data-y="email-row">
            <div class="y-c-form-field" data-y="email-field">
                <label for="email" class="y-c-account-label" data-y="email-label">البريد الالكتروني</label>
                <input type="email" id="email" class="y-c-account-input" value="" required data-y="email-input">
            </div>
        </div>
        <div class="y-c-form-row-special" data-y="password-row">
            <div class="y-c-form-field" data-y="password-field">
                <label for="password" class="y-c-account-label" data-y="password-label">كلمة السر</label>
                <input type="password" id="password" class="y-c-account-input" value="************" disabled
                    data-y="password-input">
            </div>
            <a href="#" class="y-c-change-password-link" data-y="change-password-link">تغيير كلمة السر</a>
        </div>
    </div>

    <div class="y-c-form-section" data-y="personal-info-section">
        <h3 class="y-c-form-section-title" data-y="personal-info-title">معلومات شخصية</h3>
        <div class="y-c-form-row" data-y="name-row">
            <div class="y-c-form-field" data-y="first-name-field">
                <label for="first-name" class="y-c-account-label" data-y="first-name-label">الاسم الاول</label>
                <input type="text" id="first-name" class="y-c-account-input" value="عبدالله" required
                    data-y="first-name-input">
            </div>
            <div class="y-c-form-field" data-y="last-name-field">
                <label for="last-name" class="y-c-account-label" data-y="last-name-label">اسم العائلة</label>
                <input type="text" id="last-name" class="y-c-account-input" value="محمد" required
                    data-y="last-name-input">
            </div>
        </div>
        <div class="y-c-form-row" data-y="personal-details-row">
            <div class="y-c-form-field" data-y="birth-date-field">
                <label for="birth-date" class="y-c-account-label" data-y="birth-date-label">تاريخ الميلاد</label>
                <input type="text" id="birth-date" class="y-c-account-input" value="1990-01-01"
                    data-y="birth-date-input">
            </div>
            <div class="y-c-form-field" data-y="gender-field">
                <label for="gender" class="y-c-account-label" data-y="gender-label">النوع</label>
                <input type="text" id="gender" class="y-c-account-input" value="ذكر" data-y="gender-input">
            </div>
        </div>
        <div class="y-c-form-row" data-y="identification-row">
            <div class="y-c-form-field" data-y="id-type-field">
                <label for="id-type" class="y-c-account-label" data-y="id-type-label">نوع الإثبات الشخصي</label>
                <input type="text" id="id-type" class="y-c-account-input" value="هوية وطنية" data-y="id-type-input">
            </div>
            <div class="y-c-form-field" data-y="id-number-field">
                <label for="id-number" class="y-c-account-label" data-y="id-number-label">رقم وثيقة التعريف</label>
                <input type="text" id="id-number" class="y-c-account-input" value="1234567890" data-y="id-number-input">
            </div>
        </div>
        <div class="y-c-form-row" data-y="id-issuer-row">
            <div class="y-c-form-field" data-y="id-issue-country-field">
                <label for="id-issue-country" class="y-c-account-label" data-y="id-issue-country-label">دولة إصدار وثيقة
                    التعريف</label>
                <input type="text" id="id-issue-country" class="y-c-account-input" value="المملكة العربية السعودية"
                    data-y="id-issue-country-input">
            </div>
            <div class="y-c-form-field" data-y="client-type-field">
                <label for="client-type" class="y-c-account-label" data-y="client-type-label">نوع العميل</label>
                <input type="text" id="client-type" class="y-c-account-input" value="فرد" data-y="client-type-input">
            </div>
        </div>
        <div class="y-c-form-row" data-y="marital-status-row">
            <div class="y-c-form-field" data-y="marital-status-field">
                <label for="marital-status" class="y-c-account-label" data-y="marital-status-label">الحالة
                    الاجتماعية</label>
                <input type="text" id="marital-status" class="y-c-account-input" value="أعزب"
                    data-y="marital-status-input">
            </div>
        </div>
    </div>

    <div class="y-c-form-section" data-y="contact-info-section">
        <h3 class="y-c-form-section-title" data-y="contact-info-title">بيانات التواصل</h3>
        <div class="y-c-form-row" data-y="phone-row">
            <div class="y-c-form-field" data-y="phone-1-field">
                <label for="phone-1" class="y-c-account-label" data-y="phone-1-label">رقم الجوال</label>
                <input type="tel" id="phone-1" class="y-c-account-input" value="+966501234567" required
                    data-y="phone-1-input">
            </div>
            <div class="y-c-form-field" data-y="phone-2-field">
                <label for="phone-2" class="y-c-account-label" data-y="phone-2-label">رقم جوال ثاني</label>
                <input type="tel" id="phone-2" class="y-c-account-input" value="" data-y="phone-2-input">
            </div>
        </div>
    </div>

    <div class="y-c-form-section" data-y="license-info-section">
        <h3 class="y-c-form-section-title" data-y="license-info-title">معلومات رخصة القيادة</h3>
        <div class="y-c-form-row" data-y="license-number-row">
            <div class="y-c-form-field" data-y="license-number-field">
                <label for="license-number" class="y-c-account-label" data-y="license-number-label">رقم رخصة
                    القيادة</label>
                <input type="text" id="license-number" class="y-c-account-input" value="987654321"
                    data-y="license-number-input">
            </div>
            <div class="y-c-form-field" data-y="license-country-field">
                <label for="license-country" class="y-c-account-label" data-y="license-country-label">دولة إصدار رخصة
                    القيادة</label>
                <input type="text" id="license-country" class="y-c-account-input" value="المملكة العربية السعودية"
                    data-y="license-country-input">
            </div>
        </div>
        <div class="y-c-form-row" data-y="license-expiry-row">
            <div class="y-c-form-field" data-y="license-expiry-field">
                <label for="license-expiry" class="y-c-account-label" data-y="license-expiry-label">تاريخ انتهاء رخصة
                    القيادة</label>
                <input type="text" id="license-expiry" class="y-c-account-input" value="2028-12-31"
                    data-y="license-expiry-input">
            </div>
        </div>
    </div>

    <div class="y-c-account-form-actions" data-y="form-actions">
        <button type="submit" class="y-c-basic-btn" data-y="save-profile-btn">
            حفظ
        </button>
    </div>
</form>

<div class="y-c-management-item" data-y="notification-settings">
    <div class="y-c-management-info" data-y="notification-info">
        <h4 data-y="notification-title">
            <i class="fas fa-bell" data-y="notification-icon"></i>
            توقيف الاشعارات
        </h4>
        <p data-y="notification-description">هناك العديد من الأنواع المتوفرة لنصوص لوريم إيبسوم، ولكن الغالبية تم
            تعديلها بشكل</p>
    </div>
    <label class="y-c-toggle-switch" for="notification-toggle-input">
        <input type="checkbox" id="notification-toggle-input" data-y="notification-toggle-input">
        <span class="y-c-toggle-slider"></span>
    </label>
</div>

<div class="y-c-management-item" data-y="delete-account-section">
    <div class="y-c-management-info" data-y="delete-account-info">
        <h4 data-y="delete-account-title">
            <i class="fa-regular fa-circle-user" data-y="delete-account-icon"></i>
            حذف حسابي
        </h4>
        <p data-y="delete-account-description">هناك العديد من الأنواع المتوفرة لنصوص لوريم إيبسوم، ولكن الغالبية تم
            تعديلها بشكل</p>
    </div>
    <div class="y-c-management-actions" data-y="delete-account-actions">
        <button class="y-c-danger-link" data-y="delete-account-btn">
            تعطيل الحساب
        </button>
    </div>
</div>
