<div class="sidebar">
  <div class="filter-header">
    <h3>تصفية المنتجات</h3>
    <button class="filter-toggle" aria-label="Toggle filter sidebar">
      <i class="fas fa-chevron-up"></i>
    </button>
  </div>

  <div class="filter-content">
    <div class="filter-section">
      <div class="filter-section-header">
        <h4>الفئة</h4>
        <button class="section-toggle" aria-label="Toggle category filter">
          <i class="fas fa-chevron-up"></i>
        </button>
      </div>
      <div class="filter-options">
        <div class="filter-option">
          <input type="checkbox" id="category-1" checked>
          <label for="category-1">جميع الفئات</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="category-2">
          <label for="category-2">ملابس رجالية</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="category-3">
          <label for="category-3">ملابس نسائية</label>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <h4>المقاس</h4>
        <button class="section-toggle" aria-label="Toggle size filter">
          <i class="fas fa-chevron-up"></i>
        </button>
      </div>
      <div class="filter-options">
        <div class="filter-option">
          <input type="checkbox" id="size-1" checked>
          <label for="size-1">جميع المقاسات</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="size-2">
          <label for="size-2">صغير (S)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="size-3">
          <label for="size-3">متوسط (M)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="size-4">
          <label for="size-4">كبير (L)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="size-5">
          <label for="size-5">كبير جداً (XL)</label>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <h4>اللون</h4>
        <button class="section-toggle" aria-label="Toggle color filter">
          <i class="fas fa-chevron-up"></i>
        </button>
      </div>
      <div class="filter-options">
        <div class="color-options">
          <div class="color-option">
            <input type="checkbox" id="color-red">
            <label for="color-red" class="color-label red"> احمر</label>
          </div>
          <div class="color-option">
            <input type="checkbox" id="color-blue">
            <label for="color-blue" class="color-label blue"> ازرق</label>
          </div>
          <div class="color-option">
            <input type="checkbox" id="color-black">
            <label for="color-black" class="color-label black"> اسود</label>
          </div>
          <div class="color-option">
            <input type="checkbox" id="color-gray">
            <label for="color-gray" class="color-label gray"> رمادي</label>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <h4>نطاق السعر</h4>
        <button class="section-toggle" aria-label="Toggle color filter">
          <i class="fas fa-chevron-up"></i>
        </button>
      </div>
      <div class="filter-options">
        <div class="filter-option">
          <div class="range-container">
            <input type="range" id="price-range" min="0" max="1000" value="0">
            <div class="range-value-display">
              <span id="range-value">0</span>
              <span class="currency">ريال</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
