<!-- Add 'unread' class to notification-card for unread notifications -->
<li class="notification-card">
  <div class="notification-icon">
    <i class="fas fa-bell"></i>
  </div>
  <div class="notification-content">
    <p class="notification-text">هنالك العديد من الأنواع المتوفرة لنصوص لوريم إيبسوم، ولكن الغالبية تم تعديلها بشكل ما عبر إدخال بعض النوادر أو الكلمات العشوائية إلى النص.</p>
    <span class="notification-time">منذ ساعتين</span>
  </div>
  <button class="notification-delete" aria-label="حذف الإشعار">
    <i class="fas fa-trash-can"></i>
  </button>
</li>
