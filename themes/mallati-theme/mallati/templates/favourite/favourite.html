<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mallati - مولاتي</title>
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="manifest" href="../manifest.json" />

  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />

  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/products.css" />
  <link rel="stylesheet" href="../../components/breadcrumb.css" />
  <link rel="stylesheet" href="./favourite.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="container y-u-w-full y-u-flex y-u-justify-center y-u-flex-col">
      <div class="y-u-max-w-1200 y-u-w-full fav-page">
        <div class="header y-u-flex y-u-flex-col y-u-py-32 y-u-p-t-24">
          <h1 class="y-u-color-muted y-u-text-2xl"> قائمة المفضلة</h1>
          <p class="y-u-text-2xl y-u-text-bold y-u-mb-16 y-u-color-muted breadcrumb"><a
              href="../layout/index.html">الرئيسية</a> > قائمة المفضلة</p>

        </div>

        <ul class="products-grid">
          <li class="product-card">
            <a href="../product-details/product-details.html" class="product-link">
              <div class="product-img">
                <img src="../../assets/cat1.png" alt="Product 1" />
                <div class="discount">خصم 20%</div>
              </div>
              <div class="product-content">
                <p class="product-description">بنطلون رجالي كاجوال بجيوب سوستة وشريط فضي</p>
                <p class="product-price">
                  <span>200.50 ر.س</span>
                </p>
              </div>
            </a>
            <div class="product-actions">
              <button class="y-c-btn y-c-btn--primary product-add-to-cart">أضف إلى السلة <img
                  src="../../assets/cart-details.svg" alt=""></button>
              <label class="product-add-to-wishlist">
                <input type="checkbox" class="wishlist-checkbox">
                <i class="far fa-heart"></i>
              </label>
            </div>
          </li>

          <li class="product-card">
            <a href="../product-details/product-details.html" class="product-link">
              <div class="product-img">
                <img src="../../assets/cat1.png" alt="Product 1" />
              </div>
              <div class="product-content">
                <p class="product-description">بنطلون رجالي كاجوال بجيوب سوستة وشريط فضي</p>
                <p class="product-price">
                  <span>200.50 ر.س</span>
                </p>
              </div>
            </a>
            <div class="product-actions">
              <button class="y-c-btn y-c-btn--primary product-add-to-cart">أضف إلى السلة <img
                  src="../../assets/cart-details.svg" alt=""></button>
              <label class="product-add-to-wishlist">
                <input type="checkbox" class="wishlist-checkbox">
                <i class="far fa-heart"></i>
              </label>
            </div>
          </li>

        </ul>


        <div class="empty-state y-u-hidden">
          <p>قائمة المفضلة لديك فارغة</p>
        </div>
      </div>
    </section>
  </main>



  <y-footer></y-footer>


  <script src="../../js/y-app-init.js"></script>
</body>

</html>
