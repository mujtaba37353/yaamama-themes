<!-- Product Card Component - For displaying products/offers -->
<div class="product-card">
  <a href="#" class="product-img">
    <img src="../../assets/book.png" alt="Product Image">
    <div class="infos" role="region" aria-label="تفاصيل العرض">
      <h3 class="offer-title">عرض بيوتي تايم</h3>
      <ul class="info" role="list">
        <li>
          <i class="fas fa-star" aria-hidden="true"></i>
          <span>جلسة لمعان وترطيب</span>
        </li>
        <li>
          <i class="fas fa-cut" aria-hidden="true"></i>
          <span>قص احترافي</span>
        </li>
        <li>
          <i class="fas fa-wind" aria-hidden="true"></i>
          <span>استشوار مع ويفي</span>
        </li>
        <li>
          <i class="fas fa-clock" aria-hidden="true"></i>
          <span>المدة ساعة ونصف</span>
        </li>
      </ul>
    </div>
    <div class="logo">
      <img src="../../assets/navbar-icon.png" alt="logo">
    </div>
  </a>
  <div class="price">
    <p>250 <img src="../../assets/ryal-prim.svg" alt="sar"></p>
    <p class="old-price">200 <img src="../../assets/ryal-prim.svg" alt="sar"></p>
  </div>
  <p class="product-title">عرض التالق والانوثة باشراق بيوتي</p>
  <a href="#" class="btn full"><img src="../../assets/book-now.svg" alt="book-now">احجز الان</a>
</div>
