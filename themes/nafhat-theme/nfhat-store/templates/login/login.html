<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nafhat - متجر العطور</title>
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />

  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/badges.css" />
  <link rel="stylesheet" href="../../components/cards.css" />
  <link rel="stylesheet" href="../../components/forms.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />

  <link rel="stylesheet" href="../../components/auth.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main class="auth-main">
    <section class="auth-section">
      <div class="container">
        <div class="auth-form">
          <h2>تسجيل الدخول</h2>
          <form>
            <div class="form-group">
              <label for="email"> البريد الإلكتروني</label>
              <input type="email" id="email" required placeholder="example@gmail.com" />
            </div>
            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <input type="password" id="password" required placeholder="********" />
              <a href="../forget-password/forget-password.html" class="forgot-password">نسيت كلمة المرور؟</a>
            </div>
            <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
          </form>
          <div class="separator"><span>أو</span></div>
          <div class="social-login">
            <button class="social-btn google">
              <i class="fab fa-google"></i> المتابعة باستخدام جوجل
            </button>
            <button class="social-btn apple">
              <i class="fab fa-apple"></i> المتابعة باستخدام ابل
            </button>
          </div>
          <div class="no-email-note">
            ليس لديك بريد إلكتروني؟
            <a href="../signup/signup.html">سجل الآن</a>
          </div>
          <div class="switch-auth">
            <p>ليس لديك حساب؟ <a href="../signup/signup.html">إنشاء حساب</a></p>
          </div>
        </div>
      </div>
    </section>
    </div>
  </main>



  <y-footer></y-footer>

  <script src="../../js/y-core.js"></script>
  <script src="../../js/y-app-init.js"></script>
</body>

</html>
