<div class="contact-us">
  <div class="contact-header">
    <h1>يسعدنا استقبال رسالتك <i class="fa-solid fa-envelope"></i></h1>
  </div>

  <div class="contact-container">
    <div class="contact-info">
      <h2>تواصل معنا</h2>
      <div class="info-item">
        <i class="fa-solid fa-location-dot"></i>
        <p>الرياض - المملكة العربية السعودية</p>
      </div>
      <div class="info-item">
        <i class="fa-solid fa-phone"></i>
        <p>059688929 - 058493948</p>
      </div>
      <div class="info-item">
        <i class="fa-solid fa-envelope"></i>
        <p>info@super.ksa.com</p>
      </div>
    </div>

    <form action="" method="post" class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label for="name">الإسم ثلاثي*</label>
          <input type="text" id="name" name="name" class="input" required />
        </div>
        <div class="form-group">
          <label for="email">البريد الإلكتروني*</label>
          <input type="email" id="email" name="email" class="input" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">رقم الهاتف*</label>
          <input type="tel" id="phone" name="phone" class="input" required />
        </div>
        <div class="form-group">
          <label for="topic">موضوع الرسالة*</label>
          <input type="text" id="topic" name="topic" class="input" required />
        </div>
      </div>

      <div class="form-group full-width">
        <label for="message">نص الرسالة*</label>
        <textarea id="message" name="message" class="textarea" rows="6" required></textarea>
      </div>

      <button type="submit" class="btn-primary">إرسال</button>
    </form>
  </div>
</div>
