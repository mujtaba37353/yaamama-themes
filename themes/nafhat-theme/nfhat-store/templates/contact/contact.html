<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا - نفحات</title>
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="manifest" href="../manifest.json" />

  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />

  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/toggle.css" />
  <link rel="stylesheet" href="../../components/forms.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />

  <link rel="stylesheet" href="./contact.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main class="y-u-p-t-0">
    <section class="container y-u-w-full y-u-flex y-u-justify-center y-u-flex-col">
      <div class="header y-u-flex y-u-justify-between y-u-items-center y-u-p-y-56 y-u-p-t-24">
        <h1 class="y-u-color-primary y-u-text-2xl">تواصل معنا</h1>
      </div>
      <div class="y-u-max-w-1200 y-u-w-full contact-grid">
        <div class="contact-card y-u-surface y-u-rounded-12 y-u-shadow-sm">
          <h2 class="y-u-text-xl y-u-text-bold">أرسل رسالة</h2>
          <form class="y-u-grid y-u-gap-16" action="#" method="post">
            <div class="y-c-field">
              <label class="y-c-label" for="name">الاسم الكامل</label>
              <input class="y-c-input" id="name" name="name" type="text" placeholder="اكتب اسمك" required />
            </div>
            <div class="y-c-field">
              <label class="y-c-label" for="email">البريد الإلكتروني</label>
              <input class="y-c-input" id="email" name="email" type="email" placeholder="example@mail.com" required />
            </div>
            <div class="y-c-field">
              <label class="y-c-label" for="subject">الموضوع</label>
              <input class="y-c-input" id="subject" name="subject" type="text" placeholder="موضوع الرسالة" />
            </div>
            <div class="y-c-field">
              <label class="y-c-label" for="message">نص الرسالة</label>
              <textarea class="y-c-textarea" id="message" name="message" rows="5" placeholder="اكتب رسالتك هنا"
                required></textarea>
              <p class="y-c-help">سنرد خلال 24 ساعة عمل.</p>
            </div>
            <button type="submit" class="y-c-btn y-c-btn--primary y-u-w-full">
              إرسال الرسالة
            </button>
          </form>
        </div>

        <div class="info-card y-u-surface y-u-rounded-12 y-u-shadow-sm">
          <h2 class="y-u-text-xl y-u-text-bold">معلومات التواصل</h2>
          <ul class="contact-list">
            <li>
              <i class="fas fa-location-dot"></i>
              <span>الرياض، المملكة العربية السعودية</span>
            </li>
            <li>
              <i class="fas fa-envelope"></i>
              <a href="mailto:support@nafhat.com">support@nafhat.com</a>
            </li>
            <li>
              <i class="fas fa-phone"></i>
              <a href="tel:+966500000000">+966 50 000 0000</a>
            </li>
            <li class="socials">
              <a aria-label="Instagram" href="#"><i class="fab fa-instagram"></i></a>
              <a aria-label="facebook" href="#"><i class="fab fa-facebook"></i></a>
              <a aria-label="Snapchat" href="#"><i class="fab fa-snapchat"></i></a>
            </li>
          </ul>

          <div class="map">
            <iframe title="map"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3624.006470365758!2d46.675296!3d24.713551!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e2f042f4f9b7a23%3A0x9af0b5a24b!2sRiyadh!5e0!3m2!1sar!2ssa!4v1688570000000"
              width="100%" height="240" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>

  <y-footer></y-footer>

  <script src="../../js/y-app-init.js"></script>


</body>

</html>
