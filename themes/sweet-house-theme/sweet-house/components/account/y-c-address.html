<div class="address-empty-state">
  <h2 class="section-title">أدخل عنوان الفاتورة الجديد *</h2>

  <div class="address-form">
    <div class="form-row">
      <div class="form-group">
        <label for="invFirstName">الاسم الأول *</label>
        <input type="text" id="invFirstName" required />
      </div>
      <div class="form-group">
        <label for="invLastName">اسم العائلة *</label>
        <input type="text" id="invLastName" required />
      </div>
    </div>

    <div class="form-group">
      <label>الدولة / المنطقة *</label>
      <p class="country-text">المملكة العربية السعودية</p>
    </div>

    <div class="form-group full-width">
      <label for="invAddress">العنوان *</label>
      <input type="text" id="invAddress" placeholder="عنوان الشارع رقم المنزل" required />
    </div>

    <div class="form-group full-width">
      <input type="text" id="invApartment" placeholder="رقم الشقة (اختياري)" />
    </div>

    <div class="form-group full-width">
      <label for="invCity">المدينة *</label>
      <input type="text" id="invCity" required />
    </div>

    <div class="form-group full-width">
      <label for="invProvince">المحافظة *</label>
      <input type="text" id="invProvince" required />
    </div>

    <div class="form-group full-width">
      <label for="invPostal">الرمز البريدي *</label>
      <input type="text" id="invPostal" required />
    </div>

    <div class="form-group full-width">
      <label for="invPhone">الهاتف *</label>
      <input type="tel" id="invPhone" required />
    </div>

    <div class="form-group full-width">
      <label for="invEmail">البريد الإلكتروني *</label>
      <input type="email" id="invEmail" required />
    </div>

    <button class="btn-save">حفظ</button>
  </div>
</div>
